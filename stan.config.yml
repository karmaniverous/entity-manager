stan-core:
  stanPath: .stan
  excludes:
    - CHANGELOG.md
    - docs
    - package-lock.json
  imports:
    '@karmaniverous/entity-client-dynamodb':
      - ../entity-client-dynamodb/.stan/interop/entity-manager/**
    '@karmaniverous/entity-manager-demo':
      - ../entity-manager-demo/.stan/interop/entity-manager/**
    '@karmaniverous/entity-tools':
      - ../entity-tools/.stan/interop/entity-manager/**
      - ../entity-tools/guides/stan-assistant-guide.md
    '@karmaniverous/mock-db':
      - ../mock-db/.stan/interop/entity-manager/**
      - ../mock-db/guides/stan-assistant-guide.md
stan-cli:
  cliDefaults:
    run:
      facets: false
      plan: false
      sequential: true
  patchOpenCommand: code -g {file}
  scripts:
    build: cross-env NO_COLOR=1 npm run build
    typecheck: npm run typecheck
    lint:
      script: npm run lint:fix
      warnPattern: \\d+:\\d+\\s+warning
    test: npm run test -- --no-color
    docs:
      script: npm run docs -- --emit none
      warnPattern: \\[warning\\]
    knip: npm run knip
